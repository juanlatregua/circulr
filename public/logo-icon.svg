<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF3CAC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8E8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circular arc -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="url(#arcGrad)" stroke-width="9"
    stroke-dasharray="248 29" stroke-dashoffset="0"
    stroke-linecap="round"
    transform="rotate(-120 60 60)" />

  <!-- Arrow tip -->
  <polygon points="60,18 54,30 66,30" fill="#7B2FFF"
    transform="rotate(185 60 60)" />

  <!-- Teal dot -->
  <circle cx="60" cy="16" r="5.5" fill="url(#dotGrad)"
    transform="rotate(-120 60 60)" />

  <!-- R letter -->
  <text x="60" y="75"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="52" font-weight="900"
    fill="#F5F5F0"
    text-anchor="middle"
    letter-spacing="-2">R</text>
</svg>
